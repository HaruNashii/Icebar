name: Rust - Aur

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build Icebar AUR Package
    runs-on: ubuntu-latest
    steps:
      - name: Build Icebar AUR Package
        uses: DuckSoft/build-aur-action@v1.1
        with:
          repo-name: icebar-git
